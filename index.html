<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelime Kontrol Noktası</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --paper: #F3EEE3;
    --paper-line: #DDD5C2;
    --ink: #241F18;
    --ink-soft: #6E6656;
    --forest: #1F4D3A;
    --forest-soft: #E4EBE4;
    --red: #A02E2E;
    --red-soft: #F5E4E1;
    --card: #FBF8F1;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, var(--paper-line) 28px);
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink);
    padding: 24px;
  }

  .ticket {
    position: relative;
    background: var(--card);
    width: 100%;
    max-width: 460px;
    border: 1.5px solid var(--ink);
    padding: 0;
    box-shadow: 6px 6px 0 var(--ink);
  }

  .ticket-header {
    padding: 22px 28px 18px;
    border-bottom: 1.5px dashed var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .kimlik {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }

  .kimlik strong {
    display: block;
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin-top: 2px;
  }

  .no {
    font-size: 0.7rem;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.6;
  }

  .ticket-body {
    padding: 26px 28px 28px;
  }

  .aciklama {
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    line-height: 1.55;
    color: var(--ink-soft);
    margin: 0 0 24px;
  }

  label {
    display: block;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: background 0.15s ease;
  }

  input[type="text"]::placeholder {
    color: #A79E88;
  }

  input[type="text"]:focus {
    background: #fff;
  }

  input[type="text"].invalid {
    border-color: var(--red);
    background: var(--red-soft);
  }

  button {
    padding: 12px 20px;
    border: 1.5px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
  }

  button:hover {
    background: var(--forest);
    border-color: var(--forest);
  }

  button:active {
    transform: translate(1px, 1px);
  }

  .sonuc {
    margin-top: 22px;
    display: none;
    align-items: center;
    gap: 16px;
  }

  .sonuc.show { display: flex; }

  .stamp {
    flex-shrink: 0;
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: 3px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 0.62rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    line-height: 1.15;
    transform: rotate(-8deg);
    animation: stampIn 0.28s cubic-bezier(.2,1.4,.4,1);
  }

  @keyframes stampIn {
    from { transform: rotate(-8deg) scale(1.6); opacity: 0; }
    to { transform: rotate(-8deg) scale(1); opacity: 1; }
  }

  .stamp.onay {
    border-color: var(--forest);
    color: var(--forest);
  }

  .stamp.red {
    border-color: var(--red);
    color: var(--red);
  }

  .sonuc-metin {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    line-height: 1.4;
  }

  .sonuc-metin span {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .panter-alani {
    display: none;
    justify-content: center;
    margin-top: 18px;
  }

  .panter-alani.show {
    display: flex;
  }

  .panter-svg {
    width: 110px;
    height: 110px;
    animation: panterGiris 0.4s cubic-bezier(.25,1.6,.4,1), panterTitre 0.45s ease-in-out 0.4s 2;
  }

  @keyframes panterGiris {
    0% { transform: scale(0.3) rotate(-6deg); opacity: 0; }
    60% { transform: scale(1.12) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes panterTitre {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    20% { transform: translateX(-3px) rotate(-2deg); }
    40% { transform: translateX(3px) rotate(2deg); }
    60% { transform: translateX(-2px) rotate(-1deg); }
    80% { transform: translateX(2px) rotate(1deg); }
  }

  .panter-goz {
    animation: gozKisma 1.1s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes gozKisma {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.35); }
  }

  .perfor {
    position: absolute;
    top: 50%;
    width: 20px;
    height: 20px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    transform: translateY(-50%);
  }

  .perfor.left { left: -11px; }
  .perfor.right { right: -11px; }
</style>
</head>
<body>

  <div class="ticket">
    <span class="perfor left"></span>
    <span class="perfor right"></span>

    <div class="ticket-header">
      <div class="kimlik">
        Denetim Formu
        <strong>Kelime Girişi</strong>
      </div>
      <div class="no">
        NO. 00042<br>
        <span id="tarih"></span>
      </div>
    </div>

    <div class="ticket-body">
      <p class="aciklama">Girdiğiniz kelime denetimden geçirilir. Uygunsuz ifadeler onaylanmaz.</p>

      <label for="kelimeInput">Kelime</label>
      <div class="input-row">
        <input type="text" id="kelimeInput" placeholder="yazınız..." autocomplete="off" spellcheck="false">
        <button id="gonderBtn">Denetle</button>
      </div>

      <div class="sonuc" id="sonucAlani">
        <div class="stamp" id="stampEl"></div>
        <div class="sonuc-metin" id="sonucMetin"></div>
      </div>

      <div class="panter-alani" id="panterAlani">
        <svg class="panter-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- kulaklar -->
          <path d="M55 60 L35 15 L80 45 Z" fill="#1C1A18"/>
          <path d="M145 60 L165 15 L120 45 Z" fill="#1C1A18"/>
          <!-- kafa -->
          <ellipse cx="100" cy="105" rx="70" ry="60" fill="#232019"/>
          <!-- çene/burun bölgesi (açık, hafif kontrast) -->
          <ellipse cx="100" cy="130" rx="42" ry="30" fill="#2E2A22"/>
          <!-- kaşlar (öfkeli, çatık) -->
          <path d="M50 85 Q68 70 88 82" stroke="#0F0D0B" stroke-width="7" stroke-linecap="round" fill="none"/>
          <path d="M150 85 Q132 70 112 82" stroke="#0F0D0B" stroke-width="7" stroke-linecap="round" fill="none"/>
          <!-- gözler -->

          <!-- burun -->
          <path d="M92 118 L108 118 L100 128 Z" fill="#0F0D0B"/>

          <path d="M100 140 Q78 150 62 138" stroke="#0F0D0B" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M100 140 Q122 150 138 138" stroke="#0F0D0B" stroke-width="4" stroke-linecap="round" fill="none"/>
          <!-- dişler -->
          <path d="M75 141 L70 155 L80 144 Z" fill="#F3EEE3"/>
          <path d="M125 141 L130 155 L120 144 Z" fill="#F3EEE3"/>
          <path d="M88 146 L86 158 L94 148 Z" fill="#F3EEE3"/>
          <path d="M112 146 L114 158 L106 148 Z" fill="#F3EEE3"/>
          <!-- bıyıklar -->

          <path d="M155 130 L186 132" stroke="#4A4536" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

  </div>

    "geri zekalısın", "gerizekalisin", "malın teki", "aptalın teki", "salağın teki",
    "beyinsizin teki", "ahmağın teki", "ahmaksın", "dangalaksın", "küstah", "kustah",
    "küstahsın", "kustahsin", "namussuz", "namussuzsun", "şerefsiz herif", "ezik",
    "eziksin", "onursuz", "haysiyetsizsin", "karaktersiz", "bok gibi", "değersizsin",
    "degersizsin", "hiçsin", "iğrenç herif", "igrenc herif", "iğrençsin", "igrencsin",
    "rezil herif", "rezilsin", "acizsin", "zavallı herif", "zavalli herif", "amsalak",
    "daşak", "daşağı", "daşşak", "daşşağı", "folloş", "kahbe", "kaltağ", "kancığ",
    "orsp", "pzvnk", "qavat", "yalaka", "sıçar", "sıçayım", "sıçmak", "sıçsın", "sktr"
  ];

  const harfTablosu = {
    '0': 'o', '1': 'i', '3': 'e', '4': 'a', '5': 's', '7': 't',
    '@': 'a', '$': 's', '+': 't', '!': 'i',
    'ç': 'c', 'ğ': 'g', 'ı': 'i', 'i̇': 'i', 'ö': 'o', 'ş': 's', 'ü': 'u'
  };

  function harfNormalizeEt(metin) {
    return metin
      .toLocaleLowerCase('tr-TR')
      .split('')
      .map(ch => harfTablosu[ch] !== undefined ? harfTablosu[ch] : ch)
      .join('');
  }

  function normalize(metin) {
    const t = harfNormalizeEt(metin);

    // noktalama ve fazla boşlukları temizle (harfler arasına konan boşluk/nokta/tire atlatmalarını yakalamak için)
    const harfleriBirlestir = t.replace(/[^a-z0-9\s]/g, '');

    // tekrar eden harfleri teke indir (siiiik -> sik gibi denemeler için)
    const tekrarsiz = harfleriBirlestir.replace(/(.)\1{2,}/g, '$1$1');

    return {
      normal: t.trim(),
      bosluksuz: harfleriBirlestir.replace(/\s+/g, '').trim(),
      tekrarsiz: tekrarsiz.trim()
    };
  }

  function kufurIceriyorMu(metin) {
    const { normal, bosluksuz, tekrarsiz } = normalize(metin);
    return kokKelimeler.some(kelime => {
      // anahtar kelimeyi de GİRDİYLE AYNI şekilde normalize et (ç/ğ/ı/ö/ş/ü ve leet
      // dönüşümleri anahtar kelime tarafında da uygulanmazsa eşleşme kaçırılır)
      const k = harfNormalizeEt(kelime);
      const kBosluksuz = k.replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, '');
      return normal.includes(k) || bosluksuz.includes(kBosluksuz) || tekrarsiz.includes(kBosluksuz);
    });
  }

  const input = document.getElementById('kelimeInput');
  const btn = document.getElementById('gonderBtn');
  const sonucAlani = document.getElementById('sonucAlani');
  const stampEl = document.getElementById('stampEl');
  const sonucMetin = document.getElementById('sonucMetin');
  const tarihEl = document.getElementById('tarih');
  const panterAlani = document.getElementById('panterAlani');

  tarihEl.textContent = new Date().toLocaleDateString('tr-TR');

  function sonucGoster(tip) {
    sonucAlani.classList.remove('show');
    panterAlani.classList.remove('show');
    void sonucAlani.offsetWidth; // reflow ile animasyonu yeniden tetikle
    stampEl.className = 'stamp ' + (tip === 'onay' ? 'onay' : 'red');
    stampEl.textContent = tip === 'onay' ? 'ONAYLANDI' : 'REDDEDİLDİ';

    if (tip === 'onay') {
      sonucMetin.innerHTML = "Bravo Bengi'yi mutlu ettiniz<span>Kayıt kabul edildi</span>";
    } else {
      sonucMetin.innerHTML = "Korkmaya başla, Bengi çok sinirlendi<span>Lütfen uygun bir kelime girin</span>";
      panterAlani.classList.add('show');
    }
    sonucAlani.classList.add('show');
  }

  function gonder() {
    const deger = input.value;

    if (deger.trim() === '') {
      input.classList.add('invalid');
      return;
    }

    if (kufurIceriyorMu(deger)) {
      input.classList.add('invalid');
      input.value = '';
      sonucGoster('red');
      return;
    }

    input.classList.remove('invalid');
    sonucGoster('onay');
  }

  btn.addEventListener('click', gonder);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') gonder();
  });
  input.addEventListener('input', () => {
    input.classList.remove('invalid');
  });
</script>

</body>
